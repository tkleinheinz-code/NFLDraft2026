<head>

  <style>

    label {
      font-weight: bold;

    select, input {

    button {
      background-color: #0b5ed7;
      color: white;
      border: none;
      padding: 12px 18px;

      font-weight: 600;
      cursor: pointer;
      border-radius: 4px;
      margin-top: 20px;
    }

    button:hover {
      background-color: #094cbf;
    }
         </div>
<div class="button-row">
  <a href="indes.html">

</div>
  </style>
</head>
<body>

<h1>🏈 NFL Draft – Round 1 Predictions</h1>

<label>Your Name</label>
<input id="name" />

<hr />

<div id="picks"></div>

<button onclick="submitPicks()">Submit Picks</button>

<script>
  // ✅ EDIT ONLY THIS URL
  const WEB_APP_URL =
    "https://script.google.com/macros/s/AKfycbw8jgBd4RBb8p0OHSF9ZGuIfkTjPZYgQSdgI2YTSt3LnvEtttCsYCWzQsX4GajvvC2nsQ/exec";

  const players = [
    "Akheem Mesidor, Edge, Miami",
    "Anthony Hill Jr., LB, Texas",
    "Arvell Reese, Edge, Ohio St.",
    "Avieon Terrell, CB, Clemson",
    "Blake Miller, OT, Clemson",
    "Brandon Cisse, CB, South Carolina",
    "Caleb Banks, DT, Florida",
    "Caleb Downs, S, Ohio St.",
    "Caleb Lomu, OT, Utah",
    "Carnell Tate, WR, Ohio St.",
    "Cashius Howell, Edge, Texas A&M",
    "Chase Bisontis, OG, Texas A&M",
    "Chris Bell, WR, Louisville",
    "Chris Johnson, CB, San Diego St.",
    "Christen Miller, DT, Georgia",
    "CJ Allen, LB, Georgia",
    "Colton Hood, CB, Tennessee",
    "D'Angelo Ponds, CB, Indiana",
    "David Bailey, Edge, Texas Tech",
    "Denzel Boston, WR, Washington",
    "Dillon Thieneman, S, Oregon",
    "E. McNeil-Warren, S, Toledo",
    "Fernando Mendoza, QB, Indiana",
    "Francis Mauigoa, OT, Miami",
    "Gabe Jacas, Edge, Illinois",
    "Germie Bernard, WR, Alabama",
    "Jacob Rodriguez, LB, Texas Tech",
    "Jadarian Price, RB, Notre Dame",
    "Jake Golday, TE, Cincinnati",
    "Jeremiyah Love, RB, Notre Dame",
    "Jermod McCoy, CB, Tennessee",
    "Jordyn Tyson, WR, Arizona St.",
    "Kayden McDonald, DT, Ohio St.",
    "Kayden Proctor, OT, Alabama",
    "KC Concepcion, WR, Texas A&M",
    "Keionte Scott, S, Miami",
    "Keldric Faulk, Edge, Auburn",
    "Kenyon Sadiq, TE, Oregon",
    "Keyron Crawford, Edge, Auburn",
    "Lee Hunter, DT, Texas Tech",
    "Makai Lemon, WR, USC",
    "Malachi Lawrence, Edge, USF",
    "Mansoor Delane, CB, LSU",
    "Max Iheanachor, OT, Arizona St.",
    "Monroe Freeling, OT, Georgia",
    "Olaivavega Ioane, OG, Penn St.",
    "Omar Cooper Jr., WR, Indiana",
    "Peter Woods, DT, Clemson",
    "R Mason Thomas, Edge, Oklahoma",
    "Rueben Bain Jr., Edge, Miami",
    "Sonny Styles, LB, Ohio St.",
    "Spencer Fano, OT, Utah",
    "TJ Parker, Edge, Clemson",
    "Ty Simpson, QB, Alabama",
    "Zion Young, Edge, Missouri"
  ];

  const picksDiv = document.getElementById("picks");

  for (let i = 1; i <= 32; i++) {
    const label = document.createElement("label");
    label.textContent = "Pick " + i;

    const select = document.createElement("select");
    select.id = "pick" + i;

    const defaultOpt = document.createElement("option");
    defaultOpt.value = "";
    defaultOpt.textContent = "-- Select Player --";
    select.appendChild(defaultOpt);

    players.forEach(p => {
      const opt = document.createElement("option");
      opt.value = p;
      opt.textContent = p;
      select.appendChild(opt);
    });

    picksDiv.appendChild(label);
    picksDiv.appendChild(select);
  }

  async function submitPicks() {
    const name = document.getElementById("name").value.trim();
    if (!name) {
      alert("Enter your name");
      return;
    }

    const picks = [];
    for (let i = 1; i <= 32; i++) {
      const val = document.getElementById("pick" + i).value;
      if (!val) {
        alert("Missing pick " + i);
        return;
      }
      picks.push(val);
    }

    const res = await fetch(WEB_APP_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain" },
      body: JSON.stringify({ name, picks })
    });

    alert(await res.text());
  }
</script>

</body>
</html>
