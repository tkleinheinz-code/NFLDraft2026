<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>NFL Draft Predictions</title>
  <style>
#countdown {
  font-size: 48px;
  font-weight: 700;
  margin: 28px 0;
  letter-spacing: 1px;
}

/* Bottom-left container (ONLY thing that's fixed) */
.bottom-left-container {
  position: fixed;
  bottom: 8px;
  left: 8px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

/* Text above logo */
.brought-by {
  font-size: 16px;
  margin-bottom: 6px;
  opacity: 0.9;
  white-space: nowrap;
  text-shadow: 0 1px 3px rgba(0,0,0,0.7);
}

/* Logo image */
.bottom-left-graphic {
  width: 64px;     /* adjust size here */
  height: auto;
  display: block;
}

/* Mobile refinement */
@media (max-width: 600px) {
  .bottom-left-graphic {
    width: 40px;
  }
  .brought-by {
    font-size: 11px;
  }
}

/* ✅ MOBILE OVERRIDE ONLY */
@media (max-width: 600px) {
  #countdown {
    font-size: 30px;
  }

  .bottom-left-graphic {
    width: 36px;
    bottom: 8px;
    left: 8px;
  }
}

html, body {
  height: 100%;
  margin: 0;
  font-family: Arial, sans-serif;
}

body {
  background:
    linear-gradient(rgba(0,0,0,0.55), rgba(0,0,0,0.55)),
    url("images/splash-image.jpg") no-repeat center center fixed;
  background-size: cover;

  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;

  text-align: center;
  color: white;
}

.button-row {
  display: flex;
  flex-direction: column;
  gap: 24px;
  margin-top: 30px;
}

button {
  background-color: #0b5ed7;
  color: white;
  border: none;
  padding: 14px 20px;
  font-size: 18px;
  font-weight: 600;
  cursor: pointer;
  border-radius: 5px;
}

button:hover {
  background-color: #094cbf;
}
/* Bottom-left container */
.bottom-left-container {
  position: fixed;
  bottom: 8px;
  left: 8px;
  z-index: 999;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}

/* Text above logo */
.brought-by {
  font-size: 12px;
  margin-bottom: 6px;
  opacity: 0.9;
  white-space: nowrap;
  z-index: 1000;          /* ✅ Ensure text is above image */
  text-shadow: 0 1px 3px rgba(0,0,0,0.7); /* ✅ readability */
}

/* Logo image */
.bottom-left-graphic {
  width: 100px;   /* ✅ adjust size here only */
  height: auto;
  z-index: 999;
}

/* Mobile refinement */
@media (max-width: 600px) {
  .bottom-left-graphic {
    width: 44px;
  }
  .brought-by {
    font-size: 11px;
  }
}
  </style>
</head>
<body>
  <div class="content">
    <h1>🏈 NFL Draft Predictions</h1>
    <div id="countdown"></div>
    <p>Make your picks.
      Track the leaderboard.
      All picks will lock Thursday at 3:00 p.m.</p>
     </div>
<div class="button-row">
  <a href="predictions.html">
    <button type="button" class="leaderboard-btn">
      Submit Picks
    </button>
  </a>
  
  <a href="all-picks.html">
    <button type="button" class="leaderboard-btn">
      View All Picks
    </button>
  </a>
  
  <a href="leaderboard.html">
    <button type="button" class="leaderboard-btn">
      View Leaderboard
    </button>
  </a>
</div>
  </div>
<script>
  // April 23, 2026 at 5:00 PM Pacific
  const draftStart = new Date("April 23, 2026 17:00:00 GMT-07:00").getTime();
  const countdownEl = document.getElementById("countdown");

  function updateCountdown() {
    const now = new Date().getTime();
    const distance = draftStart - now;

    if (distance <= 0) {
      countdownEl.innerHTML = "🏈 The Draft Is Live!";
      return;
    }

    const days = Math.floor(distance / (1000 * 60 * 60 * 24));
    const hours = Math.floor((distance / (1000 * 60 * 60)) % 24);
    const minutes = Math.floor((distance / (1000 * 60)) % 60);
    const seconds = Math.floor((distance / 1000) % 60);

    countdownEl.innerHTML =
      `${days}d ${hours}h ${minutes}m ${seconds}s until kickoff`;
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
<div class="bottom-left-container">
  <div class="brought-by">
    Brought to you by <strong>The Niner Guys Podcast</strong>
  </div>
  <img
    src="images/Niner-Guys.jpg"
    class="bottom-left-graphic"
    alt="The Niner Guys Podcast"
  />
</div>
</body>
</html>
